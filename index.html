<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Upkeep v2.3 - Sihar</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #1a5d1a; --secondary: #f29727; --bg: #f0f2f5; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; background: var(--bg); font-size: 14px; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-menu button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; background: #ccc; font-weight: bold; transition: 0.3s; }
        .tab-menu button.active { background: var(--secondary); color: white; }
        
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; border-top: 4px solid var(--primary); }
        .row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        input, textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .btn-add-row { background: #f0fdf4; color: #166534; border: 1px dashed #166534; padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 16px; cursor: pointer; }
        
        /* Tombol Reset vs Hapus */
        .btn-reset-form { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-delete-db { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .btn-action { padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 12px; cursor: pointer; }

        .acc-item { background: white; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; }
        .acc-header { padding: 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; background: #fff; }
        .acc-body { padding: 12px; display: none; border-top: 1px solid #eee; background: #fafafa; line-height: 1.6; }
        .summary-box { background: #fff3cd; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; text-align: center; border: 1px solid #ffe082; color: #856404; }
        
        .btn-edit { background: var(--secondary); color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0">Monitoring Upkeep & Manuring</h3>
    <small>v2.3 - Sihar Batara Guna (Merauke)</small>
</div>

<div class="tab-menu">
    <button id="tabPlanning" class="active" onclick="switchTab('Planning')">PLANNING</button>
    <button id="tabHasil" onclick="switchTab('Hasil')">HASIL KERJA</button>
</div>

<div class="card">
    <label><b>📅 Tanggal Laporan:</b></label>
    <input type="date" id="tglLaporan" onchange="loadData()">
</div>

<div class="summary-box" id="dailySummary">Memuat data...</div>

<div class="card" id="inputForm">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <b id="formTitle" style="color:var(--primary)">Input Planning</b>
        <button class="btn-reset-form" onclick="resetForm()">🔄 Reset Form</button>
    </div>
    
    <input type="hidden" id="editId">
    <input type="text" id="kegiatan" placeholder="Nama Kegiatan (Contoh: Manuring)">
    
    <div id="paddockContainer">
        <div class="row">
            <input type="text" class="p-name" placeholder="Paddock">
            <input type="number" class="p-luas" placeholder="Ha" step="0.01">
        </div>
    </div>
    <button class="btn-add-row" onclick="addRow('paddockContainer')">+ Tambah Paddock & Luas</button>

    <div class="row">
        <input type="number" id="hk" placeholder="Jml HK">
        <input type="text" id="unit" placeholder="Unit/Alat">
    </div>

    <div id="bahanContainer">
        <div class="row"><input type="text" class="b-name" placeholder="Nama Bahan"></div>
    </div>
    <button class="btn-add-row" onclick="addRow('bahanContainer')">+ Tambah Bahan</button>

    <div class="row">
        <input type="number" id="jln" placeholder="Jln" value="0">
        <input type="number" id="rsk" placeholder="Rsk" value="0">
        <input type="number" id="std" placeholder="Std" value="0">
    </div>
    <textarea id="ket" placeholder="Keterangan tambahan..."></textarea>
    
    <button class="btn-main" onclick="simpanData()">💾 SIMPAN / UPDATE KE FIREBASE</button>
</div>

<div class="action-grid">
    <button class="btn-action" style="background:#25d366" onclick="salinWA()">🟢 Salin ke WA</button>
    <button class="btn-action" style="background:#007bff" onclick="downloadCSV()">🔵 Download CSV</button>
    <button class="btn-action" style="background:#6c757d" onclick="copyPlanningToHasil()">🔘 Salin ke Hasil</button>
    <button class="btn-delete-db" onclick="hapusSemua()">⚠️ HAPUS DATA DATABASE</button>
</div>

<div id="displayList"></div>

<script>
    // Konfigurasi Firebase dari gambar kamu
    const firebaseConfig = {
        apiKey: "AIzaSyAgxUFI0NSD-7Ka8ZxFJwkupR6rgb_i00w",
        authDomain: "monitoring-upkeep.firebaseapp.com",
        projectId: "monitoring-upkeep",
        storageBucket: "monitoring-upkeep.firebasestorage.app",
        messagingSenderId: "631929326010",
        appId: "1:631929326010:web:8f9263c2a9281ef7ff7583"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentTab = "Planning";

    // Default tanggal hari ini
    document.getElementById('tglLaporan').valueAsDate = new Date();

    function switchTab(t) {
        currentTab = t;
        document.getElementById('tabPlanning').className = (t==='Planning')?'active':'';
        document.getElementById('tabHasil').className = (t==='Hasil')?'active':'';
        document.getElementById('formTitle').innerText = "Input " + t;
        loadData();
    }

    function addRow(id, valName="", valLuas=0) {
        const div = document.createElement('div');
        div.className = 'row';
        if(id === 'paddockContainer') {
            div.innerHTML = `<input type="text" class="p-name" value="${valName}" placeholder="Paddock"><input type="number" class="p-luas" value="${valLuas}" placeholder="Ha" step="0.01"><button onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-size:18px; cursor:pointer;">✕</button>`;
        } else {
            div.innerHTML = `<input type="text" class="b-name" value="${valName}" placeholder="Bahan"><button onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-size:18px; cursor:pointer;">✕</button>`;
        }
        document.getElementById(id).appendChild(div);
    }

    // RESET HANYA DI FORM (WEB)
    function resetForm() {
        if(confirm("Bersihkan ketikan di form? (Data di database tetap aman)")) {
            document.getElementById('editId').value = "";
            document.getElementById('kegiatan').value = "";
            document.getElementById('hk').value = "";
            document.getElementById('unit').value = "";
            document.getElementById('jln').value = "0";
            document.getElementById('rsk').value = "0";
            document.getElementById('std').value = "0";
            document.getElementById('ket').value = "";
            document.getElementById('paddockContainer').innerHTML = `<div class="row"><input type="text" class="p-name" placeholder="Paddock"><input type="number" class="p-luas" placeholder="Ha" step="0.01"></div>`;
            document.getElementById('bahanContainer').innerHTML = `<div class="row"><input type="text" class="b-name" placeholder="Nama Bahan"></div>`;
        }
    }

    async function simpanData() {
        const tgl = document.getElementById('tglLaporan').value;
        if(!tgl) return alert("Pilih tanggal laporan!");

        const paddocks = Array.from(document.querySelectorAll('.p-name')).map((el, i) => ({
            name: el.value,
            luas: parseFloat(document.querySelectorAll('.p-luas')[i].value || 0)
        })).filter(p => p.name !== "");

        const bahans = Array.from(document.querySelectorAll('.b-name')).map(el => el.value).filter(b => b !== "");

        const payload = {
            tgl: tgl,
            type: currentTab,
            kegiatan: document.getElementById('kegiatan').value,
            paddocks, bahans,
            hk: parseInt(document.getElementById('hk').value || 0),
            unit: document.getElementById('unit').value,
            jln: document.getElementById('jln').value,
            rsk: document.getElementById('rsk').value,
            std: document.getElementById('std').value,
            ket: document.getElementById('ket').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!payload.kegiatan) return alert("Nama kegiatan wajib diisi!");

        const id = document.getElementById('editId').value;
        try {
            if(id) {
                await db.collection("reports_v3").doc(id).update(payload);
                alert("Data Berhasil Diperbarui!");
            } else {
                await db.collection("reports_v3").add(payload);
                alert("Data Berhasil Disimpan ke Firebase!");
            }
        } catch (e) { alert("Gagal Simpan: " + e); }
        loadData();
    }

    function loadData() {
        const tgl = document.getElementById('tglLaporan').value;
        db.collection("reports_v3").where("tgl", "==", tgl).where("type", "==", currentTab)
        .onSnapshot(snap => {
            let html = "";
            let tLuas = 0, tHK = 0;
            snap.forEach(doc => {
                const d = doc.data();
                const sumL = d.paddocks.reduce((a, b) => a + b.luas, 0);
                tLuas += sumL; tHK += d.hk;

                html += `
                <div class="acc-item">
                    <div class="acc-header" onclick="toggleAcc('${doc.id}')">
                        <span>${d.kegiatan}</span>
                        <span style="color:var(--primary)">${sumL.toFixed(2)} Ha ▼</span>
                    </div>
                    <div class="acc-body" id="body-${doc.id}">
                        <b>📍 Paddock:</b> ${d.paddocks.map(p => `${p.name}(${p.luas})`).join(", ")}<br>
                        <b>🧪 Bahan:</b> ${d.bahans.join(", ") || "-"}<br>
                        <b>👷 HK:</b> ${d.hk} | <b>🚜 Alat:</b> ${d.unit}<br>
                        <b>⚙️ Status:</b> Jln:${d.jln} Rsk:${d.rsk} Std:${d.std}<br>
                        <b>📝 Ket:</b> ${d.ket || "-"}<br>
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button class="btn-edit" onclick="tarikKeForm('${doc.id}')">✏️ EDIT</button>
                            <button style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;" onclick="hapusItem('${doc.id}')">🗑️ Hapus</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('displayList').innerHTML = html;
            document.getElementById('dailySummary').innerHTML = `📊 REKAPAN: <b>${tLuas.toFixed(2)} Ha</b> | <b>${tHK} HK</b>`;
        });
    }

    function tarikKeForm(id) {
        db.collection("reports_v3").doc(id).get().then(doc => {
            const d = doc.data();
            document.getElementById('editId').value = id;
            document.getElementById('kegiatan').value = d.kegiatan;
            document.getElementById('hk').value = d.hk;
            document.getElementById('unit').value = d.unit;
            document.getElementById('jln').value = d.jln;
            document.getElementById('rsk').value = d.rsk;
            document.getElementById('std').value = d.std;
            document.getElementById('ket').value = d.ket;
            
            document.getElementById('paddockContainer').innerHTML = "";
            d.paddocks.forEach(p => addRow('paddockContainer', p.name, p.luas));
            
            document.getElementById('bahanContainer').innerHTML = "";
            d.bahans.forEach(b => addRow('bahanContainer', b));
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function toggleAcc(id) {
        const el = document.getElementById('body-'+id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function hapusItem(id) { 
        if(confirm("Hapus kegiatan ini dari database permanen?")) await db.collection("reports_v3").doc(id).delete(); 
    }

    async function hapusSemua() {
        if(confirm("⚠️ PERINGATAN: Hapus SEMUA data tanggal ini dari DATABASE? Tindakan ini tidak bisa dibatalkan!")) {
            const tgl = document.getElementById('tglLaporan').value;
            const q = await db.collection("reports_v3").where("tgl", "==", tgl).where("type", "==", currentTab).get();
            const batch = db.batch();
            q.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Data di database telah dibersihkan.");
        }
    }

    async function copyPlanningToHasil() {
        const tgl = document.getElementById('tglLaporan').value;
        if(confirm("Salin data Planning ke Hasil Kerja untuk tanggal " + tgl + "?")) {
            const q = await db.collection("reports_v3").where("tgl", "==", tgl).where("type", "==", "Planning").get();
            if(q.empty) return alert("Tidak ada data Planning di tanggal ini.");
            q.forEach(doc => {
                let d = doc.data();
                d.type = "Hasil";
                d.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection("reports_v3").add(d);
            });
            switchTab('Hasil');
        }
    }

    function salinWA() {
        const tgl = document.getElementById('tglLaporan').value;
        let text = `*🟢 LAPORAN DAILY ${currentTab.toUpperCase()}*\n📅 *Tanggal:* ${tgl}\n`;
        text += `------------------------------------------\n`;
        
        let tH = 0; let tL = 0;
        const items = document.querySelectorAll('.acc-item');
        
        if(items.length === 0) return alert("Tidak ada data untuk disalin.");

        db.collection("reports_v3").where("tgl", "==", tgl).where("type", "==", currentTab).get().then(snap => {
            snap.forEach((doc, i) => {
                const d = doc.data();
                const lSum = d.paddocks.reduce((a,b)=>a+b.luas, 0);
                tH += d.hk; tL += lSum;
                
                text += `\n*${i+1}. ${d.kegiatan.toUpperCase()}*\n`;
                text += `  📍 Pdk: ${d.paddocks.map(p => `${p.name}(${p.luas}Ha)`).join(", ")}\n`;
                text += `  🧪 Bahan: ${d.bahans.join(", ") || "-"}\n`;
                text += `  🚜 Alat: ${d.unit} [J:${d.jln} R:${d.rsk} S:${d.std}]\n`;
                text += `  👷 HK: ${d.hk} | 📝 Ket: ${d.ket || "-"}\n`;
            });
            text += `\n------------------------------------------\n`;
            text += `📊 *TOTAL LUAS:* ${tL.toFixed(2)} Ha\n`;
            text += `👷 *TOTAL HK:* ${tH}\n`;
            text += `\n🔗 _Link Laporan:_ ${window.location.href}`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("Format WA Berhasil Disalin! Silakan Paste ke Grup.");
            });
        });
    }

    function downloadCSV() {
        const tgl = document.getElementById('tglLaporan').value;
        db.collection("reports_v3").where("tgl", "==", tgl).where("type", "==", currentTab).get().then(q => {
            let csv = "Kegiatan,Paddock,Total Luas,HK,Unit,Jln,Rsk,Std,Keterangan\n";
            q.forEach(doc => {
                const d = doc.data();
                const tl = d.paddocks.reduce((s,p)=>s+p.luas, 0);
                csv += `"${d.kegiatan}","${d.paddocks.map(p=>p.name).join(";")}","${tl}","${d.hk}","${d.unit}","${d.jln}","${d.rsk}","${d.std}","${d.ket}"\n`;
            });
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Laporan_${currentTab}_${tgl}.csv`;
            a.click();
        });
    }

    loadData();
</script>
</body>
</html>
